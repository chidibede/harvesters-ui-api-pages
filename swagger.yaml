openapi: 3.0.3
info:
  title: Harvesters Workforce API
  description: |
    **Unified spec** for Legacy church attendance (`/api/*`), Workers Hub (`/api/hub/*`), and Meetings (`/api/meeting/*`) on one API Gateway.
    Import into Postman: **Import → File → harvesters-api.openapi.yaml** (unified: legacy + hub + meetings).
    Source for Hub/Meetings paths: edit this file, then run `npm run docs:bundle`.

    ## Authentication — Legacy & Hub (JWT)

    Legacy `/api/*` and Hub `/api/hub/*` use JWT:

    1. `POST /auth/signin` or `POST /api/hub/auth/signin` with admin login code (`password` field).
    2. Store `accessToken` from response.
    3. Send on every request: `Authorization: Bearer {{accessToken}}`


    ## Authentication — Meetings (24h API key)

    1. `POST /api/meeting/auth/session` with stable `client_id` (UUID in localStorage) — no auth header.
    2. Store `api_key`; send `x-api-key: {{meetingApiKey}}` on all other meeting routes.

    Optional for write endpoints that support replay protection:
    `Idempotency-Key: {{$guid}}`

    ## Standard response envelope

    Most endpoints return:
    ```json
    { "success": true, "message": "...", "data": { ... } }
    ```
    Paginated lists may also include `page`, `per_page`, `total`.

    ## Sunday attendance date format

    Use the same format as the legacy app: **`Sunday - D/M/YYYY`**
    Example: `Sunday - 21/6/2026` — URL-encode spaces: `Sunday%20-%2021/6/2026`

    ---

    ## Flow 1 — App bootstrap (every login)

    ```
    POST /api/hub/auth/signin
      → save accessToken + user.role + user.department + user.permissions
    GET  /api/hub/rbac/me
      → navigation matrix, action flags, scope_filter, org_units
    GET  /api/hub/roles
      → church role labels for dropdowns
    ```

    Frontend uses `navigation` to show/hide sidebar items and `actions` for buttons
    (e.g. `create_training`, `nominate_workers`, `mark_training_attendance`).

    ---

    ## Flow 2 — Sunday attendance (HOD / leader)

    ```
    GET  /api/hub/uniquedates
      → pick activeDate for the Sunday being marked
    GET  /api/hub/workers?activeDate=Sunday - 21/6/2026&department=Sound&permissions=Sound,Media
      → roster with attendance state
    GET  /api/hub/unmarked/workers?activeDate=...&department=...
      → workers not yet marked (optional shortcut)
    POST /api/hub/attendance/add
      → submit marks array
    GET  /api/hub/attendance/history?department=Sound
      → history view
    GET  /api/hub/attendance/trends?department=Sound
      → top present/absent
    ```

    Admin team view (Directional / Pastoral leader):
    ```
    GET /api/hub/workers?isAdmin=true&team=Gbagada Campus&activeDate=...&permissions=Sound,Media
    GET /api/hub/attendance/admin?team=Gbagada Campus&activeDate=...
    ```

    ---

    ## Flow 3 — Training lifecycle (L&D admin creates, leaders nominate, workers participate)

    ### 3a. L&D creates training (role: admin | wf-admin | church-admin)

    ```
    POST /api/hub/trainings                          → create training
    POST /api/hub/trainings/{id}/sessions            → define session dates (for auto-completion)
    POST /api/hub/trainings/{id}/modules             → curriculum module
    POST /api/hub/trainings/{id}/modules/{moduleId}/lessons
    POST /api/hub/trainings/{id}/stream-sessions     → virtual session config (optional)
    GET  /api/hub/trainings/{id}                     → admin detail view
    ```

    ### 3b. Leader nominates workers (pending until worker accepts)

    ```
    POST /api/hub/trainings/{id}/nominate            → creates pending nominations
    GET  /api/hub/trainings/{id}/nominations         → leader views pending list
    ```

    ### 3c. Worker receives nomination

    ```
    GET  /api/hub/trainings/nominations/me             → worker's pending invitations
    POST /api/hub/trainings/nominations/{nominationId}/accept
    POST /api/hub/trainings/nominations/{nominationId}/decline
    ```

    ### 3d. Worker self-registers (requires leader approval)

    ```
    POST /api/hub/trainings/{id}/register            → worker role: creates registration request
    GET  /api/hub/trainings/{id}/registration-requests
    POST /api/hub/trainings/registration-requests/{requestId}/review  → { "approved": true }
    ```

    Admin registering on behalf (instant enroll — no approval):
    ```
    POST /api/hub/trainings/{id}/register  body: { "worker_id": 1234 }
    ```

    ### 3e. Attendance & completion

    ```
    POST /api/hub/trainings/{id}/participation       → mark present/absent per session
    POST /api/hub/trainings/{id}/enrollments/{enrollmentId}/complete  → manual complete + certificate
    GET  /api/hub/trainings/{id}/certificates
    GET  /api/hub/verify/{certificateNumber}         → public verify (no auth)
    GET  /api/hub/certificates/{certificateNumber}/download
    ```

    Auto-completion: when all `training_session` dates have `present` participation,
    enrollment completes automatically on the next participation mark.

    ### 3f. Worker training dashboard

    ```
    GET /api/hub/users/{workerId}/trainings
    GET /api/hub/users/{workerId}/training-metrics
    GET /api/hub/trainings/{id}/worker-curriculum
    ```

    ---

    ## Flow 4 — Courses lifecycle

    ```
    POST /api/hub/courses                            → draft course
    POST /api/hub/courses/{id}/sections
    POST /api/hub/courses/sections/{sectionId}/lectures
    PUT  /api/hub/courses/{id}                       → { "status": "published" }
    POST /api/hub/courses/{id}/enroll                → worker self or leader on behalf
    POST /api/hub/courses/enrollments/{enrollmentId}/lectures/{lectureId}/complete
    GET  /api/hub/users/{workerId}/courses
    ```

    ---

    ## Flow 5 — Scope hierarchy (church admin setup)

    ```
    POST /api/hub/scope/org-units                    → build tree (church → team → department)
    GET  /api/hub/scope/tree
    PUT  /api/hub/scope/admins/{adminId}             → assign leader scope
    ```

    ---

    ## Flow 6 — Certificates

    ```
    POST /api/hub/certificate-templates
    GET  /api/hub/certificate-templates
    GET  /api/hub/verify/{certificateNumber}         → public (no auth)
    GET  /api/hub/certificates/{certificateNumber}/download
    ```

    ---

    ## Flow 7 — Super admin panel

    ```
    GET/POST/PUT/DELETE  /api/hub/super/admin/workers
    GET/POST/PUT/DELETE  /api/hub/super/admin/admins
    PUT  /api/hub/super/admin/{id}/role
    PUT  /api/hub/super/admin/{id}/permissions
    ```

    ---

    ## Flow 8 — Departments & audit

    ```
    GET/POST/PUT/DELETE  /api/hub/departments
    GET  /api/hub/audit
    ```

    ---

    ## Flow 9 — Meetings kiosk (leaders meeting)

    Uses **24h meeting API keys**, not JWT. Same API Gateway base URL.

    ```
    POST /api/meeting/auth/session          → issue/reuse api_key (no auth)
    GET  /api/meeting/leaders/workers/search?name=First+Last
    PUT  /api/meeting/leaders/workers/{workerId}   → fill missing fields + meeting confirmation
    POST /api/meeting/leaders/workers              → create when not found (PENDING_ADD)
    ```

    Search requires **≥2 name tokens** (first + surname minimum). Order-independent matching.
    `PUT` only fills empty profile fields; overwriting existing values returns **409**.

    **Meeting confirmation** (stored in `meeting_registration`):

    ```json
    { "meeting_date": "2026-06-22", "is_confirmed": true }
    ```

    `meeting_date` is required when sending `is_confirmed`, `is_present`, or `notes`.
    New workers via `POST` are created with **`status: PENDING_ADD`** (admin approval).

    ---

    ## Role reference (JWT `user.role`)

    | Role | Scope | Can create training |
    |------|-------|---------------------|
    | `wf-admin`, `admin`, `church-admin` | church | Yes |
    | `HOD`, `team-head`, `directional-leader`, etc. | dept/team | No (nominate only) |
    | `worker`, `user` | self | No |
    | `super-admin` | church | No attendance mark / no training create |

  version: 1.0.0
  contact:
    name: Harvesters Workforce

servers:
  - url: https://hchpk68xfh.execute-api.eu-west-1.amazonaws.com
    description: Production API Gateway
  - url: http://localhost:3000
    description: Local SST dev (replace with your stage URL)

tags:
  - name: "Legacy — Auth"
  - name: "Legacy — Workers & Sunday Attendance"
  - name: "Legacy — Departments & Reports"
  - name: "Flow 1 — Auth & RBAC"
  - name: "Flow 2 — Directory & Attendance"
  - name: "Flow 3 — Trainings"
  - name: "Flow 4 — Courses"
  - name: "Flow 5 — Scope"
  - name: "Flow 6 — Certificates"
  - name: "Flow 7 — Super Admin"
  - name: "Flow 8 — Departments & Audit"
  - name: "Flow 9 — Meetings"

security:
  - BearerAuth: []

paths:
  # ─────────────────────────────────────────────────────────────────────────
  # LEGACY — CHURCH ATTENDANCE (/api/*) — JWT (same login as Hub)
  # Mirror routes also exist under /api/hub/* for the Workers Hub app.
  # ─────────────────────────────────────────────────────────────────────────
  /auth/signin:
    post:
      tags: ["Legacy — Auth"]
      summary: Sign in (legacy app — admin login code)
      operationId: legacySignIn
      security: []
      description: |
        Same handler as `POST /api/hub/auth/signin`. Returns a JWT used as
        `Authorization: Bearer {{accessToken}}` on all `/api/*` routes below.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  description: Admin login code (not email/password account login)
                  example: "123456"
            example:
              password: "123456"
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              example:
                success: true
                message: Sign in successful
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    id: 1
                    email: admin@harvesters.example
                    role: admin
                    department: All
                    permissions: ["Sound Team", "Media"]
        "401":
          description: Invalid login code
          content:
            application/json:
              example:
                success: false
                message: Invalid credentials

  /api/workers:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Fetch worker roster for a Sunday
      operationId: legacyFetchWorkers
      description: |
        Returns workers for one or more departments with their attendance state for `activeDate`.
        Use `permissions` (comma-separated or JSON array string) when the user spans multiple departments.
        Admin + `team` uses a different code path (team-level roster).
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          schema: { type: string }
          description: Single department filter (or use `permissions` for multiple)
          example: "Sound Team"
        - name: permissions
          in: query
          schema: { type: string }
          description: Comma-separated departments or JSON array string, e.g. `["Sound Team","Media"]`
        - name: isAdmin
          in: query
          schema: { type: string, enum: ["true", "false"] }
          description: When `"true"` with `team`, fetches admin team roster
        - name: team
          in: query
          schema: { type: string }
          description: Team/campus filter (used with `isAdmin=true`)
          example: "Gbagada Campus"
        - name: activeGroup
          in: query
          schema: { type: string, default: All }
          description: Department group filter for admin view (`All` or a specific department)
      responses:
        "200":
          description: Worker roster with attendance state for the Sunday
          content:
            application/json:
              example:
                success: true
                message: Workers fetched successfully
                data:
                  - id: 101
                    name: Chidi Bede Enwereji
                    fullname: Chidi Bede Enwereji
                    firstname: Chidi
                    lastname: Enwereji
                    othername: Bede
                    email: chidi.enwereji@example.com
                    phonenumber: "+2348012345678"
                    department: "Sound Team"
                    team: "Gbagada Campus"
                    workerrole: Member
                    status: ACTIVE
                    attendance: Present
                    attendancedate: "Sunday - 21/6/2026"
        "400":
          description: Missing activeDate or department/permissions
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workers/lookup:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Lookup worker by phone number
      operationId: legacyLookupWorkerByPhone
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string }
          description: Phone number as stored on the worker record
          example: "+2348012345678"
      responses:
        "200":
          description: Worker found or empty result
          content:
            application/json:
              example:
                success: true
                message: Worker found
                data:
                  id: 101
                  name: Chidi Bede Enwereji
                  phonenumber: "+2348012345678"
                  department: "Sound Team"
        "400":
          description: Missing phone query param

  /api/unmarked/workers:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Workers not yet marked for activeDate
      operationId: legacyFetchUnmarkedWorkers
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          required: true
          schema: { type: string }
          example: "Sound Team"
        - name: team
          in: query
          schema: { type: string }
          example: "Gbagada Campus"
      responses:
        "200":
          description: Workers with no attendance row for this Sunday
          content:
            application/json:
              example:
                success: true
                message: Unmarked workers fetched
                data:
                  - id: 205
                    name: Jane Doe
                    department: "Sound Team"
        "400":
          description: Missing activeDate or department

  /api/workers/add:
    post:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Submit new worker (PENDING_ADD)
      operationId: legacyAddWorker
      description: |
        Creates a worker with `status: PENDING_ADD` pending admin approval.
        Accepts `phone` or `phonenumber`, `role` or `workerrole`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegacyWorkerInput"
            example:
              firstname: Chidi
              lastname: Enwereji
              othername: Bede
              email: chidi.enwereji@example.com
              phone: "+2348012345678"
              role: Member
              department: "Sound Team"
              team: "Gbagada Campus"
              birthdate: "1990-05-15"
              gender: Male
      responses:
        "200":
          description: Worker submitted for approval
          content:
            application/json:
              example:
                success: true
                message: Worker added successfully
                data:
                  id: 1024
                  status: PENDING_ADD
        "400":
          description: Validation error (missing firstname/lastname)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workers/requestDelete:
    put:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Request worker removal (PENDING_DELETE)
      operationId: legacyRequestDeleteWorker
      description: |
        Marks a worker for removal pending admin approval. Sets `status: PENDING_DELETE`
        and stores delete metadata on the worker row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegacyWorkerDeleteRequest"
            example:
              workerid: 101
              deleteData:
                reasonfordelete: Relocated out of church
                nameofrequester: Jane Doe
                roleofrequester: HOD
      responses:
        "200":
          description: Delete request submitted
          content:
            application/json:
              example:
                success: true
                message: Workers removal initiated successfully
                data:
                  id: 101
                  status: PENDING_DELETE
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Worker not found or update failed

  /api/uniquedates:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: List available Sunday dates for attendance
      operationId: legacyGetUniqueDates
      description: Returns distinct `attendancedate` values already used in the system.
      responses:
        "200":
          description: Array of date strings (`Sunday - D/M/YYYY`)
          content:
            application/json:
              example:
                success: true
                message: Unique dates fetched
                data:
                  - "Sunday - 21/6/2026"
                  - "Sunday - 14/6/2026"

  /api/attendance:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Department attendance summary
      operationId: legacyFetchAttendance
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          schema: { type: string }
          description: Filter summary to one department
        - name: permissions
          in: query
          schema: { type: string }
          description: Comma-separated or JSON array of departments the user can view
      responses:
        "200":
          description: Per-department present/absent counts for the Sunday
          content:
            application/json:
              example:
                success: true
                message: Attendance fetched
                data:
                  - department: "Sound Team"
                    present: 12
                    absent: 3
                    notRecorded: 1
        "400":
          description: Missing activeDate

  /api/attendance/admin:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Admin team attendance overview
      operationId: legacyFetchAdminAttendance
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: team
          in: query
          schema: { type: string }
          example: "Gbagada Campus"
        - name: permissions
          in: query
          schema: { type: string }
        - name: activeGroup
          in: query
          schema: { type: string, default: All }
      responses:
        "200":
          description: Admin roster with attendance for team/departments
          content:
            application/json:
              example:
                success: true
                message: Admin attendance fetched
                data:
                  - id: 101
                    name: Chidi Bede Enwereji
                    department: "Sound Team"
                    attendance: Present

  /api/attendance/add:
    post:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Mark Sunday attendance (batch)
      operationId: legacyAddAttendance
      description: |
        Batch mark attendance for one or more workers. If `attendance` is omitted on a row,
        defaults to `"Not recorded"`. Caller must have permission for each `department` in the payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceAddRequest"
            example:
              attendance:
                - workerid: 101
                  name: Chidi Bede Enwereji
                  department: "Sound Team"
                  attendancedate: "Sunday - 21/6/2026"
                  attendance: Present
                - workerid: 102
                  name: Jane Doe
                  department: "Sound Team"
                  attendancedate: "Sunday - 21/6/2026"
                  attendance: Absent
      responses:
        "200":
          description: Marks saved
          content:
            application/json:
              example:
                success: true
                message: Attendance added successfully
        "400":
          description: Empty or invalid attendance array
        "403":
          $ref: "#/components/responses/Forbidden"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/attendance/history:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Attendance history for department
      operationId: legacyAttendanceHistory
      parameters:
        - name: department
          in: query
          schema: { type: string }
          example: "Sound Team"
      responses:
        "200":
          description: Historical attendance rows
          content:
            application/json:
              example:
                success: true
                data:
                  - workerid: 101
                    name: Chidi Bede Enwereji
                    attendancedate: "Sunday - 21/6/2026"
                    attendance: Present

  /api/attendance/trends:
    get:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Top present / absent workers
      operationId: legacyAttendanceTrends
      parameters:
        - name: department
          in: query
          schema: { type: string }
          example: "Sound Team"
      responses:
        "200":
          description: Trend stats for department
          content:
            application/json:
              example:
                success: true
                data:
                  mostPresent:
                    - name: Chidi Bede Enwereji
                      count: 8
                  mostAbsent:
                    - name: Jane Doe
                      count: 3

  /api/attendance/close:
    put:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Close attendance for a date (admin)
      operationId: legacyCloseAttendance
      description: Switches off attendance marking globally (admin action).
      responses:
        "200":
          description: Attendance closed
          content:
            application/json:
              example:
                success: true
                message: Attendance switched off successfully

  /api/attendance/enable:
    put:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Enable attendance marking
      operationId: legacyEnableAttendance
      responses:
        "200":
          description: Attendance enabled
          content:
            application/json:
              example:
                success: true
                message: Attendance enabled successfully

  /api/attendance/disable:
    put:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Disable attendance marking
      operationId: legacyDisableAttendance
      responses:
        "200":
          description: Attendance disabled
          content:
            application/json:
              example:
                success: true
                message: Attendance disabled successfully

  /api/attendance/not-recorded:
    delete:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Delete not-recorded attendance rows
      operationId: legacyDeleteNotRecorded
      description: Admin-only. Removes all rows where attendance = `"Not recorded"`.
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              example:
                success: true
                message: Not recorded attendance deleted successfully
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/attendance/record:
    delete:
      tags: ["Legacy — Workers & Sunday Attendance"]
      summary: Delete a specific attendance record
      operationId: legacyDeleteAttendanceRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workerid]
              properties:
                workerid:
                  type: integer
                  example: 101
                attendancedate:
                  type: string
                  description: Defaults to next Sunday if omitted
                  example: "Sunday - 21/6/2026"
            example:
              workerid: 101
              attendancedate: "Sunday - 21/6/2026"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              example:
                success: true
                message: Attendance record deleted successfully
        "404":
          description: Record not found
        "400":
          description: Invalid workerid

  /api/departments:
    get:
      tags: ["Legacy — Departments & Reports"]
      summary: List departments
      operationId: legacyListDepartments
      responses:
        "200":
          description: Department list
          content:
            application/json:
              example:
                success: true
                data:
                  - id: 1
                    name: "Sound Team"
                  - id: 2
                    name: Media

  /api/workers/generate/report:
    post:
      tags: ["Legacy — Departments & Reports"]
      summary: Generate attendance report (email)
      operationId: legacyGenerateReport
      description: Triggers weekly worker report email. No request body required.
      responses:
        "200":
          description: Report queued/sent
          content:
            application/json:
              example:
                success: true
                message: Worker report generated successfully

  /api/audit:
    get:
      tags: ["Legacy — Departments & Reports"]
      summary: Fetch audit log
      operationId: legacyFetchAudit
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Paginated audit entries
          content:
            application/json:
              example:
                success: true
                data:
                  - id: 9001
                    event: attendance_marked
                    userCode: admin@harvesters.example
                    createdAt: "2026-06-21T10:30:00.000Z"
                    metadata:
                      attendancedate: "Sunday - 21/6/2026"
                      departments: ["Sound Team"]

  /api/leadership-registrations:
    post:
      tags: ["Legacy — Departments & Reports"]
      summary: Public leadership course registration
      operationId: legacySubmitLeadershipRegistration
      security: []
      description: |
        Public endpoint (no JWT). Submits a leadership training registration form.
        `leadershipRole` is optional unless `leadershipStatus` is `"New Leader"`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadershipRegistrationInput"
            example:
              fullName: Chidi Bede Enwereji
              email: chidi.enwereji@example.com
              phoneNumber: "+2348012345678"
              sex: Male
              leadershipStatus: Worker
              leadershipRole: HOD
              campus: "Gbagada Campus"
              course: "Leadership Foundations"
      responses:
        "201":
          description: Registration submitted
          content:
            application/json:
              example:
                success: true
                message: Registration successful
        "400":
          description: Missing required field

  # ─────────────────────────────────────────────────────────────────────────
  # FLOW 1 — AUTH & RBAC
  # ─────────────────────────────────────────────────────────────────────────
  /api/hub/auth/signin:
    post:
      tags: ["Flow 1 — Auth & RBAC"]
      summary: Sign in (admin login code)
      operationId: hubSignIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  description: Admin login code
                  example: "123456"
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 42
                  route: /sound
                  department: Sound
                  team: Gbagada Campus
                  permissions: ["Sound", "Media"]
                  role: HOD
                  code: null

  /api/hub/rbac/me:
    get:
      tags: ["Flow 1 — Auth & RBAC"]
      summary: Current user RBAC context (navigation, actions, scope)
      operationId: getRbacMe
      responses:
        "200":
          description: RBAC context
          content:
            application/json:
              example:
                success: true
                message: RBAC context
                data:
                  role: HOD
                  scope:
                    level: department
                    department: Sound
                    team: Gbagada Campus
                    permissions: ["Sound"]
                  navigation:
                    dashboard: full
                    trainings: full
                    courses: full
                    admin_panel: hidden
                  actions:
                    mark_attendance: true
                    mark_training_attendance: false
                    create_training: false
                    nominate_workers: true
                  scope_filter:
                    departmentNames: ["Sound"]
                    teamNames: null
                    selfWorkerId: null
                  org_units: []

  /api/hub/roles:
    get:
      tags: ["Flow 1 — Auth & RBAC"]
      summary: List church roles (for role picker UI)
      operationId: listChurchRoles
      responses:
        "200":
          description: Role list
          content:
            application/json:
              example:
                success: true
                data:
                  - code: HOD
                    label: Head of Department
                    sort_order: 10

  # ─────────────────────────────────────────────────────────────────────────
  # FLOW 2 — DIRECTORY & ATTENDANCE
  # ─────────────────────────────────────────────────────────────────────────
  /api/hub/workers:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Fetch workers roster (with optional attendance for activeDate)
      operationId: hubFetchWorkers
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          schema: { type: string }
          example: Sound
        - name: permissions
          in: query
          description: Comma-separated department list (admin team view)
          schema: { type: string }
          example: Sound,Media,Studio
        - name: isAdmin
          in: query
          schema: { type: string, enum: ["true", "false"] }
          example: "false"
        - name: team
          in: query
          schema: { type: string }
          example: Gbagada Campus
        - name: activeGroup
          in: query
          schema: { type: string, default: All }
          example: All
      responses:
        "200":
          description: Worker roster

  /api/hub/unmarked/workers:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Workers not yet marked for activeDate
      operationId: hubFetchUnmarkedWorkers
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          required: true
          schema: { type: string }
          example: Sound
      responses:
        "200":
          description: Unmarked workers

  /api/hub/uniquedates:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: List available Sunday dates for attendance
      operationId: hubGetUniqueDates
      responses:
        "200":
          description: Date strings

  /api/hub/attendance:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Department attendance summary
      operationId: hubFetchAttendance
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          schema: { type: string }
          example: Sound
      responses:
        "200":
          description: Attendance summary

  /api/hub/attendance/admin:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Admin team attendance overview
      operationId: hubFetchAdminAttendance
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: team
          in: query
          schema: { type: string }
          example: Gbagada Campus
        - name: permissions
          in: query
          schema: { type: string }
          example: Sound,Media
      responses:
        "200":
          description: Admin attendance

  /api/hub/attendance/add:
    post:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Mark Sunday attendance (batch)
      operationId: hubAddAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attendance]
              properties:
                attendance:
                  type: array
                  items:
                    $ref: "#/components/schemas/AttendanceRecord"
            example:
              attendance:
                - workerid: 101
                  name: Jane Doe
                  department: Sound
                  attendancedate: "Sunday - 21/6/2026"
                  attendance: Present
                - workerid: 102
                  name: John Smith
                  department: Sound
                  attendancedate: "Sunday - 21/6/2026"
                  attendance: Absent
      responses:
        "200":
          description: Marks saved

  /api/hub/attendance/history:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Attendance history for department
      operationId: hubAttendanceHistory
      parameters:
        - name: department
          in: query
          schema: { type: string }
          example: Sound
      responses:
        "200":
          description: History

  /api/hub/attendance/trends:
    get:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Top present/absent workers
      operationId: hubAttendanceTrends
      parameters:
        - name: department
          in: query
          schema: { type: string }
          example: Sound
      responses:
        "200":
          description: Trends

  /api/hub/attendance/close:
    put:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Close attendance for a date
      operationId: hubCloseAttendance
      requestBody:
        content:
          application/json:
            example:
              attendancedate: "Sunday - 21/6/2026"
              department: Sound
      responses:
        "200":
          description: Closed

  /api/hub/attendance/enable:
    put:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Enable attendance marking
      operationId: hubEnableAttendance
      responses:
        "200":
          description: Enabled

  /api/hub/attendance/disable:
    put:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Disable attendance marking
      operationId: hubDisableAttendance
      responses:
        "200":
          description: Disabled

  /api/hub/attendance/not-recorded:
    delete:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Delete not-recorded attendance rows
      operationId: hubDeleteNotRecorded
      parameters:
        - $ref: "#/components/parameters/activeDate"
        - name: department
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /api/hub/attendance/record:
    delete:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Delete a specific attendance record
      operationId: hubDeleteAttendanceRecord
      requestBody:
        content:
          application/json:
            example:
              workerid: 101
              attendancedate: "Sunday - 21/6/2026"
              department: Sound
      responses:
        "200":
          description: Deleted

  /api/hub/workers/add:
    post:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Add workers (pending approval flow)
      operationId: hubAddWorkers
      requestBody:
        content:
          application/json:
            example:
              workers:
                - firstname: Ada
                  lastname: Okonkwo
                  email: ada@example.com
                  department: Sound
                  phonenumber: "+2348012345678"
      responses:
        "200":
          description: Workers submitted

  /api/hub/workers/requestDelete:
    put:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Request worker removal
      operationId: hubRequestDeleteWorker
      requestBody:
        content:
          application/json:
            example:
              workerid: 101
              reason: Relocated
      responses:
        "200":
          description: Removal requested

  /api/hub/workers/generate/report:
    post:
      tags: ["Flow 2 — Directory & Attendance"]
      summary: Generate attendance report email
      operationId: hubGenerateReport
      requestBody:
        content:
          application/json:
            example:
              department: Sound
              attendancedate: "Sunday - 21/6/2026"
      responses:
        "200":
          description: Report queued

  # ─────────────────────────────────────────────────────────────────────────
  # FLOW 3 — TRAININGS
  # ─────────────────────────────────────────────────────────────────────────
  /api/hub/trainings:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: List trainings (paginated + dashboard metrics)
      operationId: listTrainings
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: search
          in: query
          schema: { type: string }
          example: leadership
        - name: category
          in: query
          schema: { type: string, enum: [leadership, orientation, skills] }
          example: leadership
        - name: status
          in: query
          schema: { type: string, enum: [upcoming, ongoing, completed] }
          example: ongoing
      responses:
        "200":
          description: Training list with metrics
          content:
            application/json:
              example:
                success: true
                data:
                  - id: "01JXYZ1234567890ABCDEF"
                    name: New Workers Orientation
                    category: orientation
                    mode: physical
                    status: ongoing
                    number_of_enrollees: 24
                page: 1
                per_page: 20
                total: 1
                metrics:
                  total_trainings: 5
                  ongoing_trainings: 2
                  total_certificates_issued: 12
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Create training (wf-admin | admin | church-admin only)
      operationId: createTraining
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingInput"
            example:
              name: New Workers Orientation — June 2026
              description: Mandatory orientation for new department workers.
              cohort: "June 2026"
              start_date: "2026-06-01"
              end_date: "2026-06-30"
              category: orientation
              mode: physical
              duration: "4 weeks"
              capacity: 50
              registration_deadline: "2026-05-25T23:59:59.000Z"
              template_slug: new-workers-orientation
      responses:
        "201":
          description: Training created
          content:
            application/json:
              example:
                success: true
                data:
                  training_id: "01JXYZ1234567890ABCDEF"
                  registration_link: https://hub.example.com/trainings/register/01JXYZ1234567890ABCDEF

  /api/hub/trainings/nominations/me:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: "Flow 3c: Worker's pending nominations"
      operationId: listMyNominations
      responses:
        "200":
          description: My nominations
          content:
            application/json:
              example:
                success: true
                data:
                  - id: "01JNOM1234567890ABCDEF"
                    status: pending
                    training_id: "01JXYZ1234567890ABCDEF"
                    training_name: New Workers Orientation
                    expires_at: "2026-07-05T00:00:00.000Z"

  /api/hub/trainings/nominations/{nominationId}/accept:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: "Flow 3c: Worker accepts nomination → enrolled"
      operationId: acceptNomination
      parameters:
        - $ref: "#/components/parameters/nominationId"
      responses:
        "200":
          description: Enrolled
          content:
            application/json:
              example:
                success: true
                data:
                  nomination_id: "01JNOM1234567890ABCDEF"
                  enrollment:
                    id: "01JENR1234567890ABCDEF"
                    enrollment_type: primary

  /api/hub/trainings/nominations/{nominationId}/decline:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: "Flow 3c: Worker declines nomination"
      operationId: declineNomination
      parameters:
        - $ref: "#/components/parameters/nominationId"
      responses:
        "200":
          description: Declined

  /api/hub/trainings/registration-requests/{requestId}/review:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: "Flow 3d: Leader approves/declines self-registration"
      operationId: reviewRegistrationRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string }
          example: "01JREQ1234567890ABCDEF"
      requestBody:
        required: true
        content:
          application/json:
            example:
              approved: true
      responses:
        "200":
          description: Reviewed

  /api/hub/trainings/{id}:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Training detail (admin view — curriculum, enrollees, sessions)
      operationId: getTrainingDetail
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Full training detail

  /api/hub/trainings/{id}/enrollees:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Paginated enrollee list with attendance status
      operationId: getTrainingEnrollees
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
      responses:
        "200":
          description: Enrollees

  /api/hub/trainings/{id}/register:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: |
        Register for training.
        - **Worker self**: creates pending registration request (leader must approve).
        - **Leader/admin with worker_id**: instant enrollment.
      operationId: registerForTraining
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                worker_id:
                  type: integer
                  description: Optional — leaders/admins register on behalf of worker
                  example: 101
            examples:
              workerSelfRegister:
                summary: Worker self-register (no body)
                value: {}
              leaderRegisterOnBehalf:
                summary: Leader registers worker 101
                value:
                  worker_id: 101
      responses:
        "201":
          description: Registration request created (worker) or enrolled (leader)
          content:
            application/json:
              examples:
                pendingRequest:
                  summary: Worker self-register response
                  value:
                    success: true
                    message: Registration request submitted for approval
                    data:
                      request_id: "01JREQ1234567890ABCDEF"
                      status: pending
                      already_enrolled: false
                enrolled:
                  summary: Leader on-behalf response
                  value:
                    success: true
                    message: Registered
                    data:
                      enrollment_id: "01JENR1234567890ABCDEF"
                      enrollment_type: primary
                      already_enrolled: false

  /api/hub/trainings/{id}/nominate:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: "Flow 3b: Leader nominates workers (pending until accept)"
      operationId: nominateWorkers
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            example:
              worker_ids: [101, 102, 103]
              expires_in_days: 14
      responses:
        "200":
          description: Nomination results per worker
          content:
            application/json:
              example:
                success: true
                data:
                  - worker_id: 101
                    success: true
                    nomination_id: "01JNOM1234567890ABCDEF"
                    status: pending

  /api/hub/trainings/{id}/nominations:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: List all nominations for a training (leader view)
      operationId: listTrainingNominations
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Nominations

  /api/hub/trainings/{id}/registration-requests:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: List pending self-registration requests
      operationId: listRegistrationRequests
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Registration requests

  /api/hub/trainings/{id}/sessions:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: List scheduled sessions (used for auto-completion)
      operationId: listTrainingSessions
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Sessions
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Add a session date
      operationId: postTrainingSession
      parameters:
        - $ref: "#/components/parameters/trainingId"
      requestBody:
        required: true
        content:
          application/json:
            example:
              session_date: "2026-06-08"
              label: Week 1 — Introduction
      responses:
        "201":
          description: Session created

  /api/hub/trainings/{id}/modules:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Add curriculum module
      operationId: postTrainingModule
      parameters:
        - $ref: "#/components/parameters/trainingId"
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Module 1 — Church Vision
              sort_order: 0
      responses:
        "201":
          description: Module created

  /api/hub/trainings/{id}/modules/{moduleId}/lessons:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Add lesson to module
      operationId: postTrainingLesson
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - name: moduleId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Welcome & Expectations
              content: "<p>Lesson HTML or markdown</p>"
              sort_order: 0
      responses:
        "201":
          description: Lesson created

  /api/hub/trainings/{id}/curriculum:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Full curriculum (admin)
      operationId: getTrainingCurriculum
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Modules + lessons

  /api/hub/trainings/{id}/worker-curriculum:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Curriculum for enrolled worker
      operationId: getWorkerTrainingCurriculum
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Worker curriculum

  /api/hub/trainings/{id}/participation:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Mark training session attendance (present/absent)
      operationId: postTrainingParticipation
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            example:
              worker_id: 101
              session_date: "2026-06-08"
              status: present
      responses:
        "200":
          description: Participation recorded (may trigger auto-completion)
          content:
            application/json:
              example:
                success: true
                data:
                  id: "01JPART1234567890ABCDEF"
                  updated: false
                  auto_complete:
                    auto_completed: true
                    certificate_created: true

  /api/hub/trainings/{id}/department-assignments:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Department onboarding assignments
      operationId: listDepartmentAssignments
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Assignments
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Create department assignment
      operationId: postDepartmentAssignment
      parameters:
        - $ref: "#/components/parameters/trainingId"
      requestBody:
        required: true
        content:
          application/json:
            example:
