    post:
      tags: ["Flow 3 — Trainings"]
      summary: Add recording to library
      operationId: postRecording
      parameters:
        - $ref: "#/components/parameters/trainingId"
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Session 1 Recording
              storage_url: https://cdn.example.com/recordings/session1.mp4
              duration_seconds: 3600
              downloadable: true
              library_visible: true
      responses:
        "201":
          description: Recording added

  /api/hub/users/{id}/trainings:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Worker's enrolled trainings
      operationId: getUserTrainings
      parameters:
        - $ref: "#/components/parameters/workerId"
      responses:
        "200":
          description: User trainings

  /api/hub/users/{id}/training-metrics:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: Worker training stats
      operationId: getUserTrainingMetrics
      parameters:
        - $ref: "#/components/parameters/workerId"
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              example:
                success: true
                data:
                  total_trainings_taken: 3
                  ongoing: 1
                  completed: 2
                  certificates: 2

  # ─────────────────────────────────────────────────────────────────────────
  # FLOW 4 — COURSES
  # ─────────────────────────────────────────────────────────────────────────
  /api/hub/courses:
    get:
      tags: ["Flow 4 — Courses"]
      summary: List courses
      operationId: listCourses
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: status
          in: query
          schema: { type: string, enum: [draft, in_progress, review, published] }
        - name: search
          in: query
          schema: { type: string }
