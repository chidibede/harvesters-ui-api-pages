  /api/hub/trainings/{id}/stream-sessions/{streamSessionId}:
    patch:
      tags: ["Flow 3 — Trainings"]
      summary: Update stream session (start/end, URL)
      operationId: patchStreamSession
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - name: streamSessionId
