      responses:
        "201":
          description: Assignment created

  /api/hub/trainings/{id}/enrollments/{enrollmentId}/complete:
    post:
      tags: ["Flow 3 — Trainings"]
      summary: Manually complete enrollment + issue certificate PDF
      operationId: completeEnrollment
      parameters:
        - $ref: "#/components/parameters/trainingId"
        - name: enrollmentId
          in: path
          required: true
          schema: { type: string }
          example: "01JENR1234567890ABCDEF"
        - $ref: "#/components/parameters/idempotencyKey"
      responses:
        "200":
          description: Completed
          content:
            application/json:
              example:
                success: true
                data:
                  enrollment_id: "01JENR1234567890ABCDEF"
                  certificate_created: true
                  issued_certificate:
                    certificate_number: HRV-M5XYZ-ABC123
                    pdf_base64: "..."

  /api/hub/trainings/{id}/certificates:
    get:
      tags: ["Flow 3 — Trainings"]
      summary: List certificates issued for training
      operationId: listTrainingCertificates
      parameters:
        - $ref: "#/components/parameters/trainingId"
      responses:
        "200":
          description: Certificates

  /api/hub/trainings/{id}/stream-sessions:
    post:
