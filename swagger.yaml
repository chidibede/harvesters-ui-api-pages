components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Obtain via POST /api/hub/auth/signin.
        Postman: set collection variable `accessToken`, then Authorization → Bearer {{accessToken}}

  parameters:
    page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    per_page:
      name: per_page
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    activeDate:
      name: activeDate
      in: query
      required: true
      description: "Sunday date — format: `Sunday - D/M/YYYY`"
      schema: { type: string }
      example: "Sunday - 21/6/2026"
    trainingId:
      name: id
      in: path
      required: true
      description: Training ULID
      schema: { type: string }
      example: "01JXYZ1234567890ABCDEF"
    courseId:
      name: id
      in: path
      required: true
      schema: { type: string }
      example: "01JCOURSE1234567890ABCD"
    workerId:
      name: id
      in: path
      required: true
      description: Numeric worker id from directory
      schema: { type: integer }
      example: 101
    nominationId:
      name: nominationId
      in: path
      required: true
      schema: { type: string }
      example: "01JNOM1234567890ABCDEF"
    certificateNumber:
      name: certificateNumber
      in: path
      required: true
      schema: { type: string }
      example: HRV-M5XYZ-ABC123
    idempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Prevents duplicate writes on retry (nominate, register, complete)

  schemas:
    CreateTrainingInput:
      type: object
      required: [name, start_date, end_date, category, mode]
      properties:
        name: { type: string, maxLength: 500 }
        description: { type: string, maxLength: 1500 }
        cohort: { type: string }
        start_date: { type: string, format: date, example: "2026-06-01" }
        end_date: { type: string, format: date, example: "2026-06-30" }
        category: { type: string, enum: [leadership, orientation, skills] }
        mode: { type: string, enum: [physical, virtual] }
        duration: { type: string, example: "4 weeks" }
        capacity: { type: integer, example: 50 }
        registration_deadline: { type: string, format: date-time }
        template_slug: { type: string }

    AttendanceRecord:
      type: object
      properties:
        workerid: { type: integer }
        name: { type: string }
        department: { type: string }
        attendancedate: { type: string, example: "Sunday - 21/6/2026" }
        attendance:
          type: string
          enum: [Present, Absent, "Not recorded", Excused]

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          example:
            success: false
            message: Unauthorized
    Forbidden:
      description: Role not permitted
      content:
        application/json:
          example:
            success: false
            message: Forbidden
